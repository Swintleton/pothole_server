name: yolov5
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip
  - ipython
  - matplotlib
  - numpy
  - pandas
  - scipy
  - seaborn
  - cudatoolkit=11.1  # Adjust according to your CUDA version if needed
  - pytorch=1.8.0
  - torchvision
  - torchaudio
  - opencv
  - pip:
      - pycocotools
      - thop  # Optional: for FLOPs computation
      - tensorboard  # Optional: for training visualization
      - ultralytics  # This installs additional requirements directly from the YOLOv5 repo

# If pytorch=1.8.0 is still not available, you might need to adjust this version or remove the version constraint.
